<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>StockWise &bull; Live Neon Inventory Management Hub</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='24' fill='%236366F1'/%3E%3Cpath d='M50 24 L80 40 L50 56 L20 40 Z' fill='%23818CF8'/%3E%3Cpath d='M20 40 L50 56 L50 78 L20 62 Z' fill='%234F46E5'/%3E%3Cpath d='M50 56 L80 40 L80 62 L50 78 Z' fill='%234338CA'/%3E%3Cpath d='M50 24 L50 56' stroke='white' stroke-width='1.5' stroke-linecap='round' opacity='0.4'/%3E%3C/svg%3E" />
    <script>
      // Clean up benign development and HMR WebSocket connection errors from the console
      (function() {
        const suppressPatterns = ['WebSocket', 'client', 'vite', 'hmr'];
        
        window.addEventListener('unhandledrejection', function(event) {
          const reason = event.reason || '';
          const msg = (reason.message || reason.toString() || '').toLowerCase();
          const stack = (reason.stack || '').toLowerCase();
          
          const isBenign = suppressPatterns.some(function(pattern) {
            return msg.includes(pattern) || stack.includes(pattern);
          });
          
          if (isBenign) {
            event.preventDefault();
            event.stopPropagation();
          }
        }, true);

        window.addEventListener('error', function(event) {
          const msg = (event.message || '').toLowerCase();
          const filename = (event.filename || '').toLowerCase();
          
          const isBenign = suppressPatterns.some(function(pattern) {
            return msg.includes(pattern) || filename.includes(pattern);
          });
          
          if (isBenign) {
            event.preventDefault();
            event.stopPropagation();
          }
        }, true);
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
