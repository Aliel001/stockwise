<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <title>StockWise &bull; Live Neon Inventory Management Hub</title>
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#4f46e5" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <link rel="apple-touch-icon" href="/icon.svg" />
    <link rel="icon" type="image/svg+xml" href="/icon.svg" />
    <script>
      // Load and register Service Worker for Offline capability and PWA installs
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(reg => console.log('ServiceWorker registered:', reg.scope))
            .catch(err => console.warn('ServiceWorker failure:', err));
        });
      }

      // Clean up benign development and HMR WebSocket connection errors from the console
      (function() {
        const suppressPatterns = ['WebSocket', 'client', 'vite', 'hmr'];
        
        window.addEventListener('unhandledrejection', function(event) {
          const reason = event.reason || '';
          const msg = (reason.message || reason.toString() || '').toLowerCase();
          const stack = (reason.stack || '').toLowerCase();
          
          const isBenign = suppressPatterns.some(function(pattern) {
            return msg.includes(pattern) || stack.includes(pattern);
          });
          
          if (isBenign) {
            event.preventDefault();
            event.stopPropagation();
          }
        }, true);

        window.addEventListener('error', function(event) {
          const msg = (event.message || '').toLowerCase();
          const filename = (event.filename || '').toLowerCase();
          
          const isBenign = suppressPatterns.some(function(pattern) {
            return msg.includes(pattern) || filename.includes(pattern);
          });
          
          if (isBenign) {
            event.preventDefault();
            event.stopPropagation();
          }
        }, true);
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
